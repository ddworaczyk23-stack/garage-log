name: Deploy to GitHub Pages

# Builds the Vite app on every push to main and publishes dist/ to GitHub Pages.
# One-time setup in the repo: Settings → Pages → Source → "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token: read the repo, write the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Enables Dexie Cloud sync in the deployed build. Set a repo secret
          # named VITE_DEXIE_CLOUD_URL (Settings → Secrets and variables →
          # Actions) to your https://<db>.dexie.cloud URL, and whitelist the
          # Pages origin: `npx dexie-cloud whitelist https://<user>.github.io`.
          # If the secret is unset the build still succeeds — just local-only,
          # no sync — since .env.local is not committed.
          VITE_DEXIE_CLOUD_URL: ${{ secrets.VITE_DEXIE_CLOUD_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
